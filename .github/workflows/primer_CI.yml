name: Primer CI

on:
  push:
    paths:
      - ".github/workflows/primer_CI.yml"

jobs:
  crear-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Probar version de docker
        run: docker --version 
 
      - name: Crear contenedor de entrenamiento
        run: docker build -t container_train -f docker/train/Dockerfile .

      - name: Ejecutar el contenedor container_train
        run: docker run container_train
      
      - name: Guargar artefactos en GitHub
        uses: actions/upload-artifact@v4
        with:
          name: training-artifacts
          path: |
            models/
            reports
          
      - name: Finalizar
        run: echo "Contenedor finalizado"
